services:
  postgres:
    image: postgres:15
    container_name: rental-management-postgres
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=rental-management
      - POSTGRES_USER=rental-management
      - POSTGRES_PASSWORD=rental-management
    ports:
      - "5432:5432"
    volumes:
      - rental-management-db:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  rental-management-db:
